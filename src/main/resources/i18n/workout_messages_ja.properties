pt.coaching.press=肩甲骨を安定させ、一定の軌道でプレスしましょう。
pt.coaching.squat=しっかりブレーシングし、膝とつま先を揃えて下半身全体で駆動しましょう。
pt.coaching.hinge=ニュートラルスパインを保ち、強いヒップドライブで負荷を動かしましょう。
pt.coaching.row_pull=背中のテンションを先にかけ、反動を使わずに引きましょう。
pt.coaching.shoulder=僧帽筋の関与を抑え、肩の筋肉にテンションを集中させましょう。
pt.coaching.arms=関節を固定し、ターゲットの筋肉の収縮に集中しましょう。
pt.coaching.core=呼吸とブレーシングを維持しながら動作をコントロールしましょう。
pt.coaching.generic=正確なポジショニングと呼吸に集中しましょう。
pt.coaching.combined={0} {1}
pt.coaching.phase.accumulation=ボリューム蓄積フェーズです。フォームに集中してレップを確実にこなしましょう。
pt.coaching.phase.intensification=強度増加フェーズです。重量に集中し、技術的な完成度を高めましょう。
pt.coaching.phase.realization=ピークフェーズです。最高重量に挑戦しつつ、安全を最優先にしましょう。
pt.coaching.phase.deload=回復週間です。軽く動いて体を回復させましょう。
pt.coaching.recovery.under_recovered=まだ十分に回復していません。重量を下げてフォームに集中しましょう。
pt.coaching.recovery.overreaching=最近同じ部位を頻繁にトレーニングしています。別の部位を先にするか、強度を下げましょう。
pt.coaching.recovery.detrained=久しぶりのエクササイズです。軽く始めて感覚を取り戻しましょう。
pt.coaching.performance.ready_to_progress=パフォーマンスが好調です。次のレベルに挑戦しましょう。
pt.coaching.performance.improving=上昇トレンドです。この流れを維持しましょう。
pt.coaching.performance.declining=パフォーマンスが低下しています。回復と栄養を見直しましょう。
pt.coaching.performance.needs_deload=疲労のサインが出ています。軽めのセッションを検討しましょう。
pt.coaching.performance.technique_focus=フォームの一貫性に注意が必要です。コントロールされた動作に集中しましょう。
