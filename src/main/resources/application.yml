spring:
  application:
    name: liftupai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

app:
  exercise-catalog:
    mode: ${APP_EXERCISE_CATALOG_MODE:if_empty}
    resource: ${APP_EXERCISE_CATALOG_RESOURCE:catalog/exercise-catalog.json}
    exit-after-bootstrap: ${APP_EXERCISE_CATALOG_EXIT_AFTER_BOOTSTRAP:false}
  exercise-media:
    base-url: ${APP_EXERCISE_MEDIA_BASE_URL:https://dearglobe.s3.ap-northeast-2.amazonaws.com/liftupai}

# JWT 설정
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation12345678}
  access-token-expiration: 3600000  # 1시간
  refresh-token-expiration: 2592000000  # 30일

# Google Gemini API 설정
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.0-flash-lite
  max-tokens: 2048
  temperature: 0.7

# OAuth2 소셜 로그인 설정
oauth:
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:NOT_SET}
  apple:
    client-id: ${OAUTH_APPLE_CLIENT_ID:NOT_SET}
  kakao:
    rest-api-key: ${OAUTH_KAKAO_REST_API_KEY:NOT_SET}

# AWS S3 설정
cloud:
  aws:
    s3:
      bucket: dearglobe
      folder: liftupai/
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
