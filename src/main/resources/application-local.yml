# Local 개발 환경 설정
spring:
  datasource:
    url: jdbc:mysql://localhost:3308/liftupai_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

# JWT — 로컬 개발 전용 기본값 (프로덕션은 env 필수, application.yml 참고)
jwt:
  secret: ${JWT_SECRET:localDevOnlySecretKeyForJWTTokenGeneration1234567890}

# Qdrant (local)
qdrant:
  host: localhost
  port: 6334

logging:
  level:
    root: INFO
    com.richjun.liftupai: DEBUG
    org.hibernate.SQL: DEBUG
